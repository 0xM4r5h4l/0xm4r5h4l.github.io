; Production overrides — keep this file small and intentional.

; --- Opcache: the single biggest win for Laravel response time ---
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
; Container images are immutable per-deploy, so we never need to detect file changes at runtime.
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

; --- Sane request limits for a SaaS app ---
memory_limit=256M
upload_max_filesize=25M
post_max_size=25M
max_execution_time=60

; --- Don't leak stack details or PHP version ---
expose_php=Off
display_errors=Off
log_errors=On